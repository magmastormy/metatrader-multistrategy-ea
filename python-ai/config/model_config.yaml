# Model Configuration
# Lightweight, production-ready AI models for trading

models:
  lgbm:
    enabled: true
    n_estimators: 150
    max_depth: 6
    learning_rate: 0.05
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    weight: 0.6  # Primary model
    
  transformer:
    enabled: true
    input_dim: 20
    d_model: 64
    nhead: 4
    num_layers: 3
    dropout: 0.1
    max_length: 500
    weight: 0.4  # Secondary model
    
  ensemble:
    threshold_buy: 0.7
    threshold_sell: -0.7
    confidence_min: 0.6
    
training:
  batch_size: 32
  epochs: 100
  validation_split: 0.2
  early_stopping_patience: 10
  learning_rate: 0.001
  
inference:
  cache_enabled: true
  cache_ttl_seconds: 30
  batch_inference: false
  onnx_optimization: true