# Feature Engineering Configuration

price_features:
  - returns
  - log_returns
  - volatility_20
  - volatility_50
  
technical_indicators:
  rsi:
    enabled: true
    period: 14
  macd:
    enabled: true
    fast: 12
    slow: 26
    signal: 9
  bollinger_bands:
    enabled: true
    period: 20
    std_dev: 2
  atr:
    enabled: true
    period: 14
  stochastic:
    enabled: true
    k_period: 14
    d_period: 3
    
market_structure:
  - trend_regime
  - support_resistance
  - higher_highs
  - higher_lows
  - lower_highs
  - lower_lows
  
time_features:
  - hour_sin
  - hour_cos
  - day_sin
  - day_cos
  - session_type
  
liquidity:
  - volume_ratio
  - volume_ma_20
  - price_volume_trend
