# Bridge Configuration - Python ↔ MQL5 Communication

primary:
  type: zmq
  enabled: true
  host: "127.0.0.1"
  port: 5555
  protocol: "tcp"
  pattern: "rep"  # REP/REQ pattern
  timeout_ms: 5000
  
secondary:
  type: socket
  enabled: true
  host: "127.0.0.1"
  port: 8888
  timeout_ms: 10000
  buffer_size: 4096
  
fallback:
  type: file
  enabled: true
  signal_dir: "./signals"
  request_dir: "./requests"
  poll_interval_ms: 100
  max_age_seconds: 60
  
message_format:
  encoding: "utf-8"
  compression: false
  validation: true
  
mt5_logs:
  enabled: true
  log_dir: "D:\\Program Files\\MetaTrader 5\\logs"
  parse_trades: true
  analytics: true
